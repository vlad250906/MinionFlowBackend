quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/artifact_service
quarkus.datasource.username=postgres
quarkus.datasource.password=123456

quarkus.otel.enabled=false
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317

quarkus.s3.path-style-access=true
quarkus.s3.endpoint-override=http://localhost:9000
quarkus.s3.aws.region=us-east-1
quarkus.s3.aws.credentials.type=static
quarkus.s3.aws.credentials.static-provider.access-key-id=minioadmin
quarkus.s3.aws.credentials.static-provider.secret-access-key=minioadmin
quarkus.http.limits.max-body-size=200M

quarkus.rabbitmqclient.virtual-host=/
quarkus.rabbitmqclient.username=guest
quarkus.rabbitmqclient.password=guest
quarkus.rabbitmqclient.hostname=localhost
quarkus.rabbitmqclient.port=5672

quarkus.rest-client.engine-api.url=http://localhost:8000
quarkus.rest-client.engine-log.url=http://localhost:8000