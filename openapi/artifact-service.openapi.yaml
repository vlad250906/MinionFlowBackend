info:
  title: MinionFlow Artifact Service API
  version: 1.0-SNAPSHOT
  description: 'API сервиса artifact-service: управление jar-артефактами, входными файлами, execution config, task run, логами
    и output-файлами.'
servers:
- url: http://localhost:8082
  description: Локальный запуск artifact-service
tags:
- name: JAR-артефакты
  description: Загрузка, получение, изменение и удаление jar-артефактов проекта.
- name: Конфигурации запуска
  description: Создание и сопровождение execution config для запуска задач.
- name: Входные данные
  description: Загрузка, получение, изменение и удаление input-файлов проекта.
- name: Логи
  description: Получение backlog-логов выполнения микрозадач.
- name: Output-файлы
  description: Получение метаданных и содержимого выходных файлов задачи.
- name: Задачи
  description: Создание task run, получение состояния, отмена и просмотр микрозадач.
