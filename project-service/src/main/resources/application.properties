quarkus.application.name=projectEntity-service
quarkus.http.port=8081

quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.hibernate-orm.schema-management.strategy=validate

quarkus.smallrye-openapi.security-scheme=jwt
quarkus.smallrye-openapi.security-scheme-name=BearerAuth
quarkus.smallrye-openapi.security-scheme-description=JWT Bearer token
quarkus.smallrye-openapi.jwt-security-scheme-value=bearer
quarkus.smallrye-openapi.jwt-bearer-format=JWT
quarkus.smallrye-openapi.auto-add-security-requirement=true
quarkus.swagger-ui.persist-authorization=true
mp.jwt.verify.publickey.location=publicKey.pem

quarkus.rest.exception-mapping.disable-mapper-for=io.quarkus.resteasy.reactive.jackson.runtime.mappers.BuiltinMismatchedInputExceptionMapper
quarkus.http.root-path=/project-service

service-common.message_batch=10
service-common.instance-id=1
service-common.lease_timeout=300
service-common.max-attempts=5
service-common.rabbit-pool-size=4
service-common.max-attempts-inbox=5

quarkus.rabbitmqclient.connection-recovery=true
quarkus.rabbitmqclient.topology-recovery=true
quarkus.rabbitmqclient.network-recovery-interval=5000
quarkus.rabbitmqclient.requested-heartbeat=30
quarkus.rabbitmqclient.metrics.enabled=false