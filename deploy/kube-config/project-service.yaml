apiVersion: v1
kind: Service
metadata:
  name: project-service
spec:
  type: ClusterIP
  selector:
    app: project-service
  ports:
    - port: 8081
      targetPort: 8081

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-service
  template:
    metadata:
      labels:
        app: project-service
    spec:
      containers:
        - name: project-service
          image: minionflow-project-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: QUARKUS_PROFILE
              value: prod
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: password
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: username
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: password
            - name: MP_JWT_VERIFY_PUBLICKEY_LOCATION
              value: /etc/minionflow/jwt/publicKey.pem
          volumeMounts:
            - name: jwt
              mountPath: /etc/minionflow/jwt
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: jwt
          secret:
            secretName: jwt-secret
            items:
              - key: publicKey.pem
                path: publicKey.pem
